<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonos Utility</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #fafafa;
      color: #333;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { font-size: 15px; color: #666; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sonos Utility</h1>
    <p>This page supports the Sonos Utility mobile app. Download the app to control your Sonos speakers.</p>
  </div>
</body>
</html>
