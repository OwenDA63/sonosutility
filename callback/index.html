<!DOCTYPE html>
<html>
<head><title>Redirecting...</title></head>
<body>
  <div class="card">
    <h1>Sonos Utility</h1>
    <p id="message">Redirecting to app...</p>
  </div>

  <script>
    const params = window.location.search;
    const appUrl = 'mysonosproject://callback' + params;
    
    // Try to open the app via custom scheme
    window.location.href = appUrl;

    // Fallback if app doesn't open after 2 seconds
    setTimeout(function() {
      document.getElementById('message').textContent = 
        'If the app didn\'t open, go back to Sonos Utility manually.';
    }, 2000);
  </script>
</body>
</html>
